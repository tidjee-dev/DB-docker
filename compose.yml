#_===========================================================================_#
#?                  ONLY USE THESE SERVICES IN DEVELOPMENT!                   #
#                                                                             #
#             !!! NEVER EXPOSE THESE SERVICES IN PRODUCTION! !!!              #
#_---------------------------------------------------------------------------_#
#  Info: Run the following command to create the .env file.                   #
#  Info: `cp MODEL.env .env`                                                  #
#  Info: Then update the values.                                              #
#_===========================================================================_#
services:
  #_===========================================================================_#
  #                                  DATABASES                                  #
  #_--------------------------------------------------------------------------  #                                                                             #
  #? Remember to:                                                               #
  #? - Update the .env file with the correct values.                            #
  #? - Run the following command to create the MySQL init script you need:      #
  #?   `cp .docker/mysql/mysql-init.EXAMPLE.sql .docker/mysql/mysql-init.sql`   #
  #? - Then update the values.                                                  #
  #_===========================================================================_#
  mysql:
    image: mysql
    container_name: db_docker-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?'MYSQL_ROOT_PASSWORD is not set'}
    volumes:
      - mysql_data:/var/lib/mysql
      - .docker/mysql/mysql-init.sql:/docker-entrypoint-initdb.d/mysql-init.sql:ro

  #_===========================================================================_#
  #                                    TOOLS                                    #
  #_---------------------------------------------------------------------------_#
  # Tool for the MySQL database.                                                 #
  #_===========================================================================_#
  phpmyadmin:
    build: .docker/phpma
    container_name: db_docker-phpmyadmin
    restart: unless-stopped
    ports:
      - "${PHPMYADMIN_PORT}:80"
    environment:
      - PMA_HOST=mysql
    depends_on:
      - mysql

#_=============================================================================_#
#                                    VOLUMES                                    #
#_-----------------------------------------------------------------------------_#
#  Volume used by the MySQL database.                                            #
#_=============================================================================_#
volumes:
  mysql_data:
    driver: local
